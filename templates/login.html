<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PADECO IMS | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            height:100vh;
            background: linear-gradient(to right, #eef2ff, #f8fafc);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-container{
            width:900px;
            height:550px; /* Dinagdagan ng konti para sa error messages */
            background:white;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
            display:flex;
        }

        /* LEFT SIDE */
        .login-left{
            width:50%;
            padding:50px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .logo-title{
            font-size:32px;
            font-weight:bold;
            color:#1e293b;
        }

        .subtitle{
            color:#64748b;
            margin-bottom:30px;
            font-size:14px;
        }

        .input-group-text{
            background:white;
            border-right:none;
            border-radius:12px 0 0 12px;
            color: #64748b;
        }

        .form-control{
            border-left:none;
            border-radius:0 12px 12px 0;
            height:50px;
        }

        .form-control:focus{
            box-shadow:none;
            border-color:#cbd5e1;
        }

        .btn-login{
            background:#2563eb;
            color:white;
            height:50px;
            border:none;
            border-radius:12px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#1d4ed8;
            color: white;
        }

        .forgot{
            text-decoration:none;
            font-size:13px;
            color:#2563eb;
        }

        /* RIGHT SIDE */
        .login-right{
            width:50%;
            position:relative;
            background:#dbeafe;
        }

        .login-right img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .overlay{
            position:absolute;
            inset:0;
            background:rgba(37,99,235,0.6);
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:white;
            padding:30px;
        }

        .alert-error {
            background-color: #fee2e2;
            color: #dc2626;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px solid #fecaca;
        }

        @media(max-width:900px){
            .login-container{ width:95%; height:auto; flex-direction:column; }
            .login-left, .login-right{ width:100%; }
            .login-right{ height:250px; }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-left">
        <div class="logo-title">PADECO IMS</div>
        <div class="subtitle">Feedmill Inventory Management System</div>

        {% if error %}
        <div class="alert-error text-center">
            <i class="bi bi-exclamation-circle-fill"></i> {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <div class="d-flex justify-content-end mb-4">
                <a href="#" onclick="alert('Please contact the System Admin to reset your password.')" class="forgot">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-login w-100">Login</button>
        </form>

        <div class="role-note mt-4 text-muted small text-center">
            Authorized Personnel Only <br>
            <strong>Admin • Production • Purchasing</strong>
        </div>
    </div>

    <div class="login-right">
        <img src="{{ url_for('static', filename='images/padeco.jpeg') }}" alt="PADECO">
        <div class="overlay">
            <div>
                <h2 class="fw-bold">PADECO Feedmills</h2>
                <p>Smart Inventory Monitoring and Management System</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
